events {
    worker_connections 1024;
}

http {
    # Define upstream servers
    upstream nodejs {
        server task-nodejs:3001;
    }
    
    upstream fastapi {
        server task-fastapi:8000;
    }
    
    upstream springboot {
        server task-springboot:8080;
    }
    
    upstream dotnet {
        server task-dotnet:5000;
    }

    server {
        listen 80;
        server_name localhost;

        # Node.js routes
        location /api/nodejs/ {
            proxy_pass http://nodejs/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # FastAPI routes
        location /api/fastapi/ {
            proxy_pass http://fastapi/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Spring Boot routes
        location /api/springboot/ {
            proxy_pass http://springboot/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # .NET routes
        location /api/dotnet/ {
            proxy_pass http://dotnet/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Default
        location / {
            return 200 "Task Manager API Gateway\nAvailable endpoints:\n- /api/nodejs/\n- /api/fastapi/\n- /api/springboot/\n- /api/dotnet/\n";
            add_header Content-Type text/plain;
        }
    }
}

events {
    worker_connections 1024;
}

http {
    upstream nodejs {
        server task-nodejs:3001;
    }
    
    upstream fastapi {
        server task-fastapi:8000;
    }
    
    upstream springboot {
        server task-springboot:8080;
    }
    
    upstream dotnet {
        server task-dotnet:5000;
    }
    
    upstream jenkins {
        server 10.0.1.24:8080;
    }

    server {
        listen 80;

        location /jenkins/ {
            proxy_pass http://jenkins;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /jenkins;
            proxy_redirect off;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
        }

        location /api/nodejs/ {
            proxy_pass http://nodejs/api/;
            proxy_set_header Host $host;
        }

        location /api/fastapi/ {
            proxy_pass http://fastapi/api/;
            proxy_set_header Host $host;
        }

        location /api/springboot/ {
            proxy_pass http://springboot/api/;
            proxy_set_header Host $host;
        }

        location /api/dotnet/ {
            proxy_pass http://dotnet/api/;
            proxy_set_header Host $host;
        }
    }
}
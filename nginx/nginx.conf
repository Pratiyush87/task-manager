events {
    worker_connections 1024;
}

http {
    upstream nodejs {
        server task-nodejs:3001;
    }
    
    upstream fastapi {
        server task-fastapi:8000;
    }
    
    upstream springboot {
        server task-springboot:8080;
    }
    
    upstream dotnet {
        server task-dotnet:5000;
    }

    # API server block (matches your API CloudFront domain)
    server {
        listen 80;
        server_name dj4yn1hc7nqm4.cloudfront.net;

        location /api/nodejs/ {
            proxy_pass http://nodejs/api/;
            proxy_set_header Host $host;
        }

        location /api/fastapi/ {
            proxy_pass http://fastapi/api/;
            proxy_set_header Host $host;
        }

        location /api/springboot/ {
            proxy_pass http://springboot/api/;
            proxy_set_header Host $host;
        }

        location /api/dotnet/ {
            proxy_pass http://dotnet/api/;
            proxy_set_header Host $host;
        }
    }

    # Grafana server block (matches the new Grafana CloudFront domain)
    server {
        listen 80;
        server_name d8wo1sqvlyobu.cloudfront.net;

        location / {
            proxy_pass http://grafana:3000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}

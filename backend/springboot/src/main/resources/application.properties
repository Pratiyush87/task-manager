# AWS Secrets Manager JDBC URL format:
# jdbc-secretsmanager:mysql://host:port/database
spring.datasource.url=jdbc-secretsmanager:mysql://task-manager-db.cjuk8iq2c0jm.ap-south-1.rds.amazonaws.com:3306/taskdb?useSSL=false
spring.datasource.driver-class-name=com.amazonaws.secretsmanager.sql.AWSSecretsManagerMySQLDriver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Server Configuration
server.port=${PORT:8080}
server.servlet.context-path=/

# Backend Name
backend.name=${BACKEND_NAME:SpringBoot}

# Actuator and Prometheus metrics
management.endpoints.web.exposure.include=health,prometheus,metrics
management.metrics.export.prometheus.enabled=true
management.endpoint.prometheus.enabled=true
management.endpoint.health.show-details=always

# AWS Secrets Manager configuration
aws.secretsmanager.secret-name=task-manager-rds-secrets
aws.secretsmanager.region=ap-south-1